version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: codearena-mysql
    environment:
      MYSQL_ROOT_PASSWORD: codearena123
      MYSQL_DATABASE: codearena
    ports:
      - "3306:3306"
    volumes:
      - codearena_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  codearena_mysql_data:
