server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/codearena?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: pass123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always

app:
  jwt:
    secret: Y29kZWFyZW5hLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1hdXRoZW50aWNhdGlvbi0yMDI1LXByb2R1Y3Rpb24tc2VjdXJl
    expiration-ms: 86400000

  code-execution:
    timeout-seconds: 5
    memory-limit-mb: 256
    use-docker: false